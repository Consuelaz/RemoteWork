<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小红书二维码 · Junes远程</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(135deg, #f8fafc 0%, #fce4ec 100%);
    }
    .qr-page {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .qr-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
      padding: 40px;
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    .qr-card h1 {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 8px;
    }
    .qr-card p {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }
    .qr-img {
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: 70vh;
      border-radius: 12px;
      overflow: hidden;
      margin: 0 auto 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      line-height: 0;
    }
    .qr-img img {
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: 70vh;
      object-fit: contain;
      display: block;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 12px 24px;
      background: #fe2c55;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }
    .back-btn:hover {
      background: #e01a3d;
    }
  </style>
</head>
<body>
  <div class="qr-page">
    <div class="qr-card">
      <h1>📕 关注小红书</h1>
      <p>扫码关注小红书，发现更多远程工作生活方式</p>
      <div class="qr-img">
        <img src="xhs_code.png" alt="小红书二维码">
      </div>
      <a href="community.html" class="back-btn">
        ← 返回社群页面
      </a>
    </div>
  </div>
</body>
</html>

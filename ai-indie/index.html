        .navbar {

            display: flex;
            justify-content: space-between;

        .nav-links a {
            color: #78716c;

        .nav-links a:hover, .nav-links a.active {

        .hero {

            opacity: 0.85;
            max-width: 500px;
            margin: 0 auto;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 32px 20px 60px;
        }
        .article-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .article-card {
            background: #fff;
            border: 1px solid #e7e5e4;
            border-radius: 12px;
            padding: 20px 24px;
            transition: all 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .article-card:hover {
            border-color: #ea580c;
            box-shadow: 0 4px 12px rgba(234,88,12,0.08);
            transform: translateY(-1px);
        }
        .article-date {
            font-size: 13px;
            color: #a8a29e;
            margin-bottom: 6px;
        }
        .article-title {
            font-size: 17px;
            font-weight: 600;
            line-height: 1.5;
            color: #1c1917;
            margin-bottom: 8px;
        }
        .article-card:hover .article-title {
            color: #ea580c;
        }
        .article-desc {
            font-size: 14px;
            color: #78716c;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .article-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            font-size: 12px;
            color: #a8a29e;
        }
        .tag {
            background: #f5f5f4;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            color: #78716c;
        }
        .footer {
            text-align: center;
            padding: 32px;
            color: #a8a29e;
            font-size: 13px;
            border-top: 1px solid #e7e5e4;
        }
        .footer a {
            color: #ea580c;
            text-decoration: none;
        }
        @media (max-width: 640px) {
            .hero { padding: 40px 16px 36px; }
            .hero h1 { font-size: 24px; }
            .container { padding: 20px 16px 40px; }
            .article-card { padding: 16px; }
            .nav-links { gap: 12px; }
            .nav-links a { font-size: 13px; }

</head>

    function formatDate(dateStr) {

    function renderArticles() {
        const list = document.getElementById('articleList');
        list.innerHTML = ARTICLES.map(a => `
            <a href="${a.file}" class="article-card">
                <div class="article-date">${formatDate(a.date)}</div>
                <div class="article-title">${a.title}</div>
            </a>
        `).join('');
    }

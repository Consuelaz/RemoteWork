<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>一人公司赚钱样本 - 深度拆解独立开发者赚钱路径</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            background: #fafaf9;
            color: #1c1917;
            line-height: 1.6;
        }
        .navbar {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #e7e5e4;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-brand {
            font-weight: 700;
            font-size: 18px;
            color: #2C5530;
            text-decoration: none;
        }
        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .nav-links a {
            color: #78716c;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }
        .nav-links a:hover, .nav-links a.active {
            color: #2C5530;
        }
        .hero {
            background: linear-gradient(135deg, #2C5530 0%, #3a7d44 100%);
            color: #fff;
            padding: 60px 24px 50px;
            text-align: center;
        }
        .hero-badge {
            display: inline-block;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }
        .hero h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }
        .hero p {
            font-size: 16px;
            opacity: 0.85;
            max-width: 520px;
            margin: 0 auto;
            line-height: 1.7;
        }
        .stats-row {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-top: 24px;
        }
        .stat-item {
            text-align: center;
        }
        .stat-item strong {
            display: block;
            font-size: 22px;
            font-weight: 700;
        }
        .stat-item span {
            font-size: 13px;
            opacity: 0.75;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 32px 20px 60px;
        }
        .section-label {
            font-size: 13px;
            color: #a8a29e;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 16px;
        }
        .article-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .article-card {
            background: #fff;
            border: 1px solid #e7e5e4;
            border-radius: 12px;
            padding: 20px 24px;
            transition: all 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .article-card:hover {
            border-color: #2C5530;
            box-shadow: 0 4px 12px rgba(44,85,48,0.08);
            transform: translateY(-1px);
        }
        .article-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .article-episode {
            font-size: 12px;
            color: #2C5530;
            font-weight: 600;
            background: #f0f7f0;
            padding: 2px 10px;
            border-radius: 4px;
        }
        .article-date {
            font-size: 13px;
            color: #a8a29e;
        }
        .article-title {
            font-size: 17px;
            font-weight: 600;
            line-height: 1.5;
            color: #1c1917;
            margin-bottom: 8px;
        }
        .article-card:hover .article-title {
            color: #2C5530;
        }
        .article-desc {
            font-size: 14px;
            color: #78716c;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .article-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            font-size: 12px;
            color: #a8a29e;
        }
        .tag {
            background: #f5f5f4;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            color: #78716c;
        }
        .footer {
            text-align: center;
            padding: 32px;
            color: #a8a29e;
            font-size: 13px;
            border-top: 1px solid #e7e5e4;
        }
        .footer a {
            color: #2C5530;
            text-decoration: none;
        }
        @media (max-width: 640px) {
            .hero { padding: 40px 16px 36px; }
            .hero h1 { font-size: 24px; }
            .stats-row { gap: 20px; }
            .stat-item strong { font-size: 18px; }
            .container { padding: 20px 16px 40px; }
            .article-card { padding: 16px; }
            .nav-links { gap: 12px; }
            .nav-links a { font-size: 13px; }
            .nav-toggle {
                display: flex;
                flex-direction: column;
                gap: 4px;
                background: none;
                border: none;
                cursor: pointer;
                padding: 4px;
            }
            .nav-toggle span {
                display: block;
                width: 20px;
                height: 2px;
                background: #1c1917;
            }
        }
        @media (min-width: 641px) {
            .nav-toggle { display: none; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="../index.html" class="nav-brand">Junes远程</a>
        <div class="nav-links">
            <a href="../index.html#jobs">远程岗位</a>
            <a href="../companies.html">科技公司</a>
            <a href="../ai-indie/index.html">AI独立派</a>
            <a href="index.html" class="active">一人公司赚钱样本</a>
            <a href="../community.html">加入社群</a>
        </div>
        <button class="nav-toggle" onclick="this.previousElementSibling.style.display=this.previousElementSibling.style.display==='flex'?'none':'flex'">
            <span></span><span></span><span></span>
        </button>
    </nav>

    <div class="hero">
        <div class="hero-badge">INDIE MONEY SAMPLES</div>
        <h1>一人公司赚钱样本</h1>
        <p>深度拆解独立开发者从0到赚钱的真实路径<br>商业模式 · 增长策略 · 可复用方法论</p>
        <div class="stats-row">
            <div class="stat-item">
                <strong id="articleCount">0</strong>
                <span>篇深度拆解</span>
            </div>
            <div class="stat-item">
                <strong id="mrrSum">$0</strong>
                <span>累计 MRR</span>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="section-label">全部文章</div>
        <div class="article-list" id="articleList">
            <!-- 由 JS 动态渲染 -->
        </div>
    </div>

    <div class="footer">
        <p>© 2026 Junes远程 · <a href="https://mp.weixin.qq.com" target="_blank">AI独立派公众号</a></p>
    </div>

    <script>
    const ARTICLES = [
        {
            episode: '#003',
            date: '2026-06-04',
            file: 'indie-money-bibly-2026-06-04.html',
            title: '同类产品100+，他30天6万下载月入$10K',
            desc: '拆解 Bibly 的赚钱路径——在极度拥挤的市场里，如何靠精准定位和快速执行力杀出一条路。',
            tags: ['App', '精准定位', '执行力']
        },
        {
            episode: '#002',
            date: '2026-06-04',
            file: 'indie-money-typingmind-2026-06-04.html',
            title: '1天开发，7天入$22K',
            desc: '拆解 TypingMind 的赚钱路径——AI 时代的套壳产品，如何做成一门正经生意。',
            tags: ['AI', 'SaaS', '快速验证']
        },
        {
            episode: '#001',
            date: '2026-06-03',
            file: 'indie-money-levelsio-2026-06-03.html',
            title: '70个项目失败了66个，剩下的4个让他年入$300万',
            desc: '拆解 Levelsio 的赚钱路径——失败率94%的一人公司，靠什么活下来并且活得很好。',
            tags: ['多产品', '独立开发', '高产出']
        },
        {
            episode: '',
            date: '2026-06-02',
            file: 'indie-money-datafast-2026-06-02.html',
            title: '512天，从0到$20K MRR',
            desc: '拆解 DataFast 的赚钱路径——让用户替你做营销，收入归因利基市场的完整打法。',
            tags: ['SaaS', '收入归因', 'API优先']
        }
    ];

    function formatDate(dateStr) {
        const [y, m, d] = dateStr.split('-');
        return `${y}年${parseInt(m)}月${parseInt(d)}日`;
    }

    function renderArticles() {
        const list = document.getElementById('articleList');
        list.innerHTML = ARTICLES.map(a => `
            <a href="${a.file}" class="article-card">
                <div class="article-card-header">
                    ${a.episode ? `<span class="article-episode">赚钱样本 ${a.episode}</span>` : '<span></span>'}
                    <span class="article-date">${formatDate(a.date)}</span>
                </div>
                <div class="article-title">${a.title}</div>
                <div class="article-desc">${a.desc}</div>
                <div class="article-meta">
                    ${a.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                </div>
            </a>
        `).join('');

        document.getElementById('articleCount').textContent = ARTICLES.length;
    }

    renderArticles();
    </script>
</body>
</html>
